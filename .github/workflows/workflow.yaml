name: Build and Release Void Linux Packages 2

env:
  TAG: workflow-${{ github.run_number }}
  SHA: ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [srcpkgs/**]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.config.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: x86_64,       libc: glibc }
          # - { arch: x86_64-musl,  libc: musl  }

    container:
      image: ghcr.io/void-linux/void-${{ matrix.config.libc }}-full:20250901R1
      options: --platform linux/amd64 --privileged
      volumes:
        - /dev:/dev
      env:
        PATH: '/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/sbin:/usr/local/bin:/tmp/bin'
        ARCH: ${{ matrix.config.arch }}
        XBPS_TARGET_ARCH: ${{ matrix.config.arch }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        
    steps:
      - name: Verify QEMU support
        run: |
          if [ ! -f /proc/sys/fs/binfmt_misc/qemu-aarch64 ] && [ "$ARCH" = "aarch64" ]; then
            echo "⚠️ QEMU aarch64 not registered. Check GitHub host setup."
          fi

      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          env -u XBPS_TARGET_ARCH xbps-install -Syu xbps
          env -u XBPS_TARGET_ARCH xbps-install -yu
          env -u XBPS_TARGET_ARCH xbps-install -y sudo bash curl git jq github-cli xtools xz zip unzip
          useradd -m -G xbuilder builder -s /bin/bash

      - name: Setup awk
        run: |
          sudo xbps-install -y gawk
          sudo ln -sf /usr/bin/gawk /usr/bin/awk
          echo "✅ awk теперь доступен: $(awk --version | head -1)"

      - name: Checkout void-packages
        uses: actions/checkout@v6
        with:
          repository: void-linux/void-packages
          ref: master

      - name: Merge xlibre srcpkgs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git config --global --add safe.directory "*"
          git remote add -f sofijacom https://github.com/Kennel-Linux/void-package.git
          git merge --no-commit --strategy-option=theirs --allow-unrelated-histories -Xignore-space-change sofijacom/main
          mkdir -p hostdir/binpkgs

      - name: Download existing packages
        run: |
          gh release download --pattern "*${ARCH}*" --dir hostdir/binpkgs --repo sofijacom/void-package || true
          # Clean wrong arch
          if [ "$ARCH" = "x86_64" ]; then
            rm -f hostdir/binpkgs/*x86_64-musl*.xbps
          elif [ "$ARCH" = "x86_64-musl" ]; then
            rm -f hostdir/binpkgs/*x86_64.xbps
          fi
          rm -f hostdir/binpkgs/*.sig2

      - name: Identify changed packages
        run: |
          chown -R builder:builder .
          latest_tag=$(gh release list --repo sofijacom/void-package --limit 1 --json tagName --jq '.[0].tagName' || echo "")
          latest_sha=""
          if [ -n "$latest_tag" ]; then
            latest_sha=$(git rev-parse "$latest_tag" 2>/dev/null || true)
          fi
          if [ -z "$latest_sha" ]; then
            latest_sha=$(git rev-list --max-parents=0 sofijacom/main 2>/dev/null || git rev-list --max-parents=0 HEAD~100)
          fi
          echo "Latest SHA: $latest_sha"
          git diff-tree -r --no-renames --name-only --diff-filter=AM "$latest_sha" "$SHA" -- 'srcpkgs/**' \
            | cut -d/ -f 2 | uniq | xargs sudo -Eu builder ./xbps-src sort-dependencies | tee /tmp/templates

      - name: Setup xbps-src
        run: |
          chown -R builder:builder .
          cat >> etc/conf << 'EOF'
          XBPS_BUILD_ENVIRONMENT=void-packages-ci
          XBPS_ALLOW_RESTRICTED=yes
          XBPS_CHROOT_CMD=uchroot
          XBPS_CFLAGS="-O2 -pipe"
          XBPS_CXXFLAGS="$XBPS_CFLAGS"
          XBPS_CPPFLAGS="$XBPS_CFLAGS"
          XBPS_LDFLAGS="-Wl,-O1 -Wl,--as-needed"
          EOF

          # Создаём masterdir и bootstrap
          sudo -Eu builder ./xbps-src -m masterdir-${ARCH} -A ${ARCH} binary-bootstrap

      - name: Build packages
        run: |
          pkgs=$(cat /tmp/templates)
          if [ -z "$pkgs" ]; then
            echo "✅ No packages changed. Nothing to build."
            touch hostdir/binpkgs/NO_NEW_PACKAGES
            exit 0
          fi
          for pkg in $pkgs; do
            echo "🏗️ Building $pkg for $ARCH..."
            sudo -Eu builder ./xbps-src -m masterdir-${ARCH} -A ${ARCH} pkg -j$(nproc) "$pkg" || echo "❌ Failed: $pkg"
          done

      - name: Index & sign
        working-directory: ./hostdir/binpkgs
        env:
          PRIVKEY: ${{ secrets.PRIV_KEY }}
          XBPS_PASSPHRASE: ${{ secrets.SIGN_PASS }}
        run: |
          sudo -Eu builder xbps-rindex --remove-obsoletes ${PWD}
          printf "%s\n" "${PRIVKEY}" > key.pem
          sudo -Eu builder xbps-rindex --privkey key.pem --sign --signedby "${REPO_NAME}-github-actions" --verbose ${PWD}
          sudo -Eu builder xbps-rindex --privkey key.pem --sign-pkg --verbose ${PWD}/*.xbps
          sudo -Eu builder rm -f key.pem
          sudo -Eu builder xbps-rindex --clean ${PWD}

      - name: checksum
        working-directory: ./hostdir/binpkgs
        run: |
          rm -rf *.sha256sum *.sha512sum
          
          # Only run the loop if there are actually files ending in .xbps
          count=$(ls -1 *.xbps 2>/dev/null | wc -l)
          if [ "$count" != 0 ]; then
            for file in *.xbps; do
              sha256sum "${file}" | cut -d ' ' -f 1 > "${file}.sha256sum"
              sha512sum "${file}" | cut -d ' ' -f 1 > "${file}.sha512sum"
            done
          else
            echo "❌ No packages found to checksum."
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.config.arch }}-repodata
          path: ./hostdir/binpkgs

      - name: short sha
        run: |
          printf "SHORT_SHA=$(git rev-parse --short ${SHA})" >> $GITHUB_ENV

      - name: release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ env.SHORT_SHA }}
          tag_name: ${{ env.TAG }}
          files: |
            ./hostdir/binpkgs/*.xbps
            ./hostdir/binpkgs/*.sig2
            ./hostdir/binpkgs/*repodata
            
