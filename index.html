<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Linux Package</title>
    <link rel="stylesheet" href="styles.css">
    <style type="text/css" media="screen">
    @import url('https://fonts.googleapis.com/css?family=Philosopher:400,700&display=swap&subset=cyrillic-ext');
    svg {
      font-weight: bold;
      max-width: 500px;
      height: auto;
    }
    text {
      font-family: 'Philosopher', sans-serif;
    }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <img src="" alt="" class="icon" width="850" height="auto">
            <p class="subtitle">Void Linux Package</p>
        </div>
    </header>
    
    <main>
<p align="center">
<svg viewbox="0 0 100 20">
  <defs>
    <lineargradient id="gradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="5%" stop-color="#829298"/>
      <stop offset="95%" stop-color="#495881"/>
    </lineargradient>
    <pattern id="wave" x="0" y="0" width="120" height="20" patternUnits="userSpaceOnUse">
      <path id="wavePath" d="M-40 9 Q-30 7 -20 9 T0 9 T20 9 T40 9 T60 9 T80 9 T100 9 T120 9 V20 H-40z" fill="url(#gradient)"> 
      
      <!-- Анимация волны достигается перемещением path  -->
     
     <animatetransform attributeName="transform" type="translate" begin="0s" dur="1.5s" from="0,0" to="40,0" repeatCount="indefinite" />
      </path>
    </pattern>
  </defs>
      <!-- Паттерн c анимированной волной применяется к тексту -->
  <text text-anchor="middle" x="50" y="15" font-size="17" fill="url(#wave)"  fill-opacity="0.9">WELCOME</text>
  <text text-anchor="middle" x="50" y="15" font-size="17" fill="url(#gradient)" fill-opacity="0.3">WELCOME</text>
</svg>
  </p>

 
            <div class="container-giscus">
              <section class="comment-form">
                <!--<h4 class="page__comments-title">Leave a comment</h4>-->
                <h2 class="commentShowForm"><a href="#" onclick="return commentShowForm()">Leave a comment</a></h2>  
             <div class="giscus">
          </div>        
       </section>   

<script src="https://giscus.app/client.js"
        data-repo="sofijacom/void-package"
        data-repo-id=""
        data-category="General"
        data-category-id=""
        data-mapping="title"
        data-strict="0"
        data-reactions-enabled="1"
        data-reactions-layout="compact"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="catppuccin_latte"
        data-lang="en"
        data-loading="lazy"
        crossorigin="anonymous"
        async>
</script>
</main>

        </div>

</body>
</html>
